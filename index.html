<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proxy Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toast notification container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Custom title bar (draggable, always visible) -->
  <div class="title-bar">
    <div class="title-bar-left">
      <button id="titleBackBtn" class="back-btn" style="display: none;">←</button>
    </div>
    <button id="closeBtn" class="title-bar-close">✕</button>
  </div>

  <div class="page-container">
    <!-- Main Page -->
    <div id="mainPage" class="page active">
      <div class="window-title">Proxy Manager</div>

      <div class="toggle-container">
        <label class="toggle-switch">
          <input type="checkbox" id="toggleProxyCheckbox" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="section">
        <label>Server & Port</label>
        <div class="input-group">
          <input type="text" id="server" placeholder="127.0.0.1" style="flex:2;" />
          <input type="number" id="port" placeholder="8080" style="flex:1;" />
        </div>
      </div>

      <div class="section" style="margin-top: 35px;">
        <label>Exceptions</label>
        <textarea id="exceptions" rows="4"></textarea>
        <button id="defaultExceptions" class="btn small" style="margin-top:6px;position: absolute;top: 130px;right: 0px;width: 60px;">Default</button>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button id="addProfile" class="btn primary">Add to Profiles</button>
        <button id="profilesBtn" class="btn">Profiles</button>
      </div>
    </div>

    <!-- Profiles Page -->
    <div id="profilesPage" class="page">
      <div class="profiles-header">
        <span class="window-title" style="margin:0;">Saved Profiles</span>
      </div>
      <div class="profiles-scroll">
        <ul id="profileList" class="profile-list"></ul>
        <div id="emptyState" class="empty-state" style="display: none;">
          <span class="empty-text">No saved profiles yet</span>
          <span class="empty-subtext">Add a profile from the main page to see it here</span>
        </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="confirmModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-title">Delete Profile</div>
      <div class="modal-message" id="modalMessage">Are you sure you want to delete this profile?</div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn">Cancel</button>
        <button id="modalConfirmBtn" class="btn danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
